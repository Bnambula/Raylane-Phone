<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="theme-color" content="#0B1628"/>
  <meta name="description" content="Raylane Express — Uganda's Digital Transport Platform"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <title>Raylane Express</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1628;
      --navy-light: #162238;
      --gold: #F5A623;
      --gold-light: #FFF4E0;
      --green: #00C896;
      --green-light: #E0FFF6;
      --white: #FFFFFF;
      --gray-50: #F8F9FB;
      --gray-100: #F0F2F6;
      --gray-200: #E2E6EE;
      --gray-400: #9AA5B8;
      --gray-600: #5A6478;
      --gray-800: #2D3447;
      --red: #EF4444;
      --font-display: 'Syne', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 3px rgba(11,22,40,0.08);
      --shadow-md: 0 4px 16px rgba(11,22,40,0.12);
      --shadow-lg: 0 8px 32px rgba(11,22,40,0.16);
    }
    html, body, #root { height: 100%; font-family: var(--font-body); background: var(--gray-50); color: var(--gray-800); }
    button { font-family: var(--font-body); cursor: pointer; }
    input, select, textarea { font-family: var(--font-body); }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
